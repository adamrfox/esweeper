<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IMAP Email Cleaner</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0e0f11;
    --surface:   #161719;
    --surface2:  #1e2023;
    --border:    #2a2c30;
    --border2:   #3a3d43;
    --text:      #e2e4e8;
    --muted:     #7a7f8a;
    --hint:      #4a4f58;
    --accent:    #4f8ef7;
    --danger:    #e05252;
    --danger-bg: #1f1416;
    --warn:      #e09a30;
    --warn-bg:   #1c1710;
    --success:   #4caf7d;
    --success-bg:#101c14;
    --mono:      'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
    --radius:    6px;
    --radius-lg: 10px;
  }

  html { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; }
  body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem 4rem; }

  h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.04em; color: var(--text); margin-bottom: 2px; }
  .tagline { font-size: 11px; color: var(--muted); margin-bottom: 2rem; letter-spacing: 0.02em; }

  .app { width: 100%; max-width: 780px; display: flex; flex-direction: column; gap: 12px; }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .panel-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .panel-title { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-weight: 600; }
  .panel-body { padding: 16px; }

  .field-row { display: grid; gap: 10px; margin-bottom: 12px; }
  .field-row.cols-2 { grid-template-columns: 1fr 1fr; }
  .field-row.cols-3 { grid-template-columns: 2fr 1fr auto; }
  .field-row.cols-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

  label { font-size: 10px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; display: block; margin-bottom: 5px; }

  input[type=text], input[type=password], input[type=number], select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface); }

  .tls-row { display: flex; align-items: center; gap: 8px; padding-top: 18px; }
  .tls-row input[type=checkbox] { width: 14px; height: 14px; accent-color: var(--accent); cursor: pointer; }
  .tls-row span { font-size: 12px; color: var(--muted); cursor: pointer; }

  .btn-row { display: flex; gap: 8px; margin-top: 4px; }
  button {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    border-radius: var(--radius);
    border: 1px solid var(--border2);
    cursor: pointer;
    padding: 7px 14px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover:not(:disabled) { filter: brightness(1.1); }
  .btn-danger { background: var(--danger); border-color: var(--danger); color: #fff; }
  .btn-danger:hover:not(:disabled) { filter: brightness(1.1); }
  .btn-ghost { background: transparent; color: var(--muted); }
  .btn-ghost:hover:not(:disabled) { background: var(--surface2); color: var(--text); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button:active:not(:disabled) { transform: scale(0.98); }

  .status-pill {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10px; letter-spacing: 0.04em;
    padding: 3px 9px; border-radius: 20px;
  }
  .pill-ok      { background: var(--success-bg); color: var(--success); border: 1px solid var(--success); }
  .pill-error   { background: var(--danger-bg);  color: var(--danger);  border: 1px solid var(--danger); }
  .pill-warn    { background: var(--warn-bg);    color: var(--warn);    border: 1px solid var(--warn); }
  .pill-info    { background: #0e1620;           color: var(--accent);  border: 1px solid var(--accent); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* filter controls */
  .seg-group { display: flex; }
  .seg-group button {
    flex: 1; border-radius: 0; border-right-width: 0; font-size: 11px;
    background: var(--bg); color: var(--muted);
  }
  .seg-group button:first-child { border-radius: var(--radius) 0 0 var(--radius); }
  .seg-group button:last-child  { border-radius: 0 var(--radius) var(--radius) 0; border-right-width: 1px; }
  .seg-group button.active { background: var(--surface2); color: var(--text); border-color: var(--accent); z-index: 1; }

  /* email table */
  .email-table-wrap { max-height: 340px; overflow-y: auto; border: 1px solid var(--border); border-radius: var(--radius); }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  th { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--hint); padding: 7px 10px; background: var(--surface2); border-bottom: 1px solid var(--border); font-weight: 600; text-align: left; }
  td { padding: 7px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr.deleting td { background: var(--danger-bg); }
  tr.deleted  td { opacity: 0.38; }
  tr.skipped  td { opacity: 0.38; }
  .col-status { width: 28px; text-align: center; }
  .col-read   { width: 26px; text-align: center; }
  .col-from   { width: 200px; }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { color: var(--text); }
  th.sortable .sort-arrow { margin-left: 4px; opacity: 0.35; font-style: normal; }
  th.sortable.asc  .sort-arrow::after { content: "↑"; opacity: 1; }
  th.sortable.desc .sort-arrow::after { content: "↓"; opacity: 1; }
  th.sortable:not(.asc):not(.desc) .sort-arrow::after { content: "↕"; }

  .col-date   { width: 140px; min-width: 140px; color: var(--muted); font-size: 11px; white-space: nowrap; overflow: visible; }
  td.col-date { overflow: visible; text-overflow: clip; }
  .col-size   { width: 90px; min-width: 90px; color: var(--muted); font-size: 11px; text-align: right; white-space: nowrap; overflow: visible; }
  .col-row-status { width: 70px; text-align: right; }

  .read-badge {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
  }
  .unread { background: var(--accent); }
  .read   { background: var(--hint); }

  .row-tag {
    font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: 600;
  }
  .tag-pending  { color: var(--hint); }
  .tag-deleting { color: var(--warn);    background: var(--warn-bg); }
  .tag-done     { color: var(--success); background: var(--success-bg); }
  .tag-skipped  { color: var(--danger);  background: var(--danger-bg); }

  /* progress */
  .progress-area { margin-top: 14px; }
  .progress-bar-bg { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 3px; background: var(--accent); border-radius: 2px; width: 0%; transition: width 0.35s ease; }
  .progress-bar-fill.danger { background: var(--danger); }
  .progress-stats { display: flex; justify-content: space-between; margin-top: 6px; font-size: 11px; color: var(--muted); }

  /* rate limit indicator */
  .rate-banner {
    display: flex; align-items: center; gap: 8px;
    background: var(--warn-bg); border: 1px solid var(--warn);
    border-radius: var(--radius); padding: 8px 12px; margin-top: 10px;
    font-size: 11px; color: var(--warn);
  }
  .rate-banner.hidden { display: none; }
  .pulse { animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.35; } }

  .notice {
    font-size: 11px; color: var(--muted); background: var(--surface2);
    border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 12px;
    margin-top: 10px; line-height: 1.7;
  }
  .hidden { display: none !important; }

  .scan-progress { display:flex; align-items:center; gap:10px; padding: 8px 0 4px; }
  .scan-spinner { display:inline-flex; gap:3px; }
  .scan-spinner span {
    display:inline-block; width:3px; height:12px; background:var(--accent);
    border-radius:2px; animation: scanbar 1s ease-in-out infinite;
  }
  .scan-spinner span:nth-child(2) { animation-delay:0.15s; }
  .scan-spinner span:nth-child(3) { animation-delay:0.30s; }
  .scan-spinner span:nth-child(4) { animation-delay:0.45s; }
  .scan-spinner span:nth-child(5) { animation-delay:0.60s; }
  @keyframes scanbar {
    0%,100% { transform: scaleY(0.35); opacity:0.4; }
    50%      { transform: scaleY(1);    opacity:1;   }
  }
  .scan-status { font-size:11px; color:var(--muted); }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<div class="app">
  <div style="text-align:center; margin-bottom:1rem;">
    <h1>⟳ IMAP Email Cleaner</h1>
    <div class="tagline">connect · preview · delete — with rate-limit handling</div>
  </div>

  <!-- ── Connection Panel ── -->
  <div class="panel" id="conn-panel">
    <div class="panel-head">
      <span class="panel-title">imap connection</span>
      <span id="conn-status"></span>
    </div>
    <div class="panel-body">
      <div class="field-row cols-3">
        <div>
          <label>hostname</label>
          <input type="text" id="host" placeholder="imap.example.com" />
        </div>
        <div>
          <label>port</label>
          <input type="number" id="port" placeholder="993" value="993" />
        </div>
        <div class="tls-row">
          <input type="checkbox" id="tls" checked />
          <span onclick="document.getElementById('tls').click()">TLS</span>
        </div>
      </div>
      <div class="field-row cols-2">
        <div>
          <label>username / email</label>
          <input type="text" id="user" placeholder="you@example.com" autocomplete="username" />
        </div>
        <div>
          <label>password</label>
          <input type="password" id="password" placeholder="••••••••••••" autocomplete="current-password" />
        </div>
      </div>
      <div class="btn-row">
        <button class="btn-primary" id="connect-btn" onclick="testConnect()">connect →</button>
        <button class="btn-ghost" id="folders-btn" onclick="loadFolders()" disabled>load folders</button>
      </div>
      <div class="notice">
        Credentials are sent only to your local Node.js server and never leave your machine.
      </div>
    </div>
  </div>

  <!-- ── Filter Panel ── -->
  <div class="panel hidden" id="filter-panel">
    <div class="panel-head">
      <span class="panel-title">filter criteria</span>
    </div>
    <div class="panel-body">
      <div class="field-row cols-2" style="margin-bottom:10px;">
        <div>
          <label>date filter mode</label>
          <div class="seg-group">
            <button class="active" data-mode="older" onclick="setFilterMode(this)">older than</button>
            <button data-mode="between" onclick="setFilterMode(this)">between dates</button>
          </div>
        </div>
        <div>
          <label>folder</label>
          <select id="folder-select">
            <option value="INBOX">INBOX</option>
          </select>
        </div>
      </div>

      <!-- older than controls -->
      <div id="mode-older" class="field-row cols-3" style="margin-bottom:10px;">
        <div>
          <label>older than</label>
          <input type="number" id="age-val" value="30" min="1" />
        </div>
        <div>
          <label>unit</label>
          <select id="age-unit">
            <option value="days">days</option>
            <option value="weeks">weeks</option>
            <option value="months" selected>months</option>
            <option value="years">years</option>
          </select>
        </div>
        <div>
          <label>read status</label>
          <div class="seg-group">
            <button class="active" data-val="all" onclick="setReadFilter(this)">all</button>
            <button data-val="unread" onclick="setReadFilter(this)">unread</button>
            <button data-val="read" onclick="setReadFilter(this)">read</button>
          </div>
        </div>
      </div>

      <!-- between dates controls -->
      <div id="mode-between" class="field-row cols-3 hidden" style="margin-bottom:10px;">
        <div>
          <label>from date</label>
          <input type="date" id="date-from" />
        </div>
        <div>
          <label>to date</label>
          <input type="date" id="date-to" />
        </div>
        <div>
          <label>read status</label>
          <div class="seg-group">
            <button class="active" data-val="all" onclick="setReadFilter(this)">all</button>
            <button data-val="unread" onclick="setReadFilter(this)">unread</button>
            <button data-val="read" onclick="setReadFilter(this)">read</button>
          </div>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn-primary" id="scan-btn" onclick="startScan()">scan →</button>
      </div>
    </div>
  </div>

  <!-- ── Preview / Delete Panel ── -->
  <div class="panel hidden" id="preview-panel">
    <div class="panel-head">
      <span class="panel-title">preview</span>
      <div id="preview-stats" style="display:flex;gap:16px;font-size:11px;color:var(--muted);">
        <span><span id="stat-count" style="color:var(--text);font-weight:500;">0</span> fetched</span>
        <span><span id="stat-size" style="color:var(--text);font-weight:500;">0 B</span> total</span>
      </div>
    </div>
    <div class="panel-body">
      <div class="scan-progress hidden" id="scan-progress">
        <div class="scan-spinner"><span></span><span></span><span></span><span></span><span></span></div>
        <span class="scan-status" id="scan-status-txt">connecting…</span>
      </div>
      <div class="email-table-wrap">
        <table>
          <colgroup>
            <col class="col-read" />
            <col class="col-from" />
            <col /> <!-- subject fills -->
            <col class="col-date" />
            <col class="col-size" />
            <col class="col-row-status" />
          </colgroup>
          <thead>
            <tr>
              <th></th>
              <th class="sortable" data-col="from" onclick="sortTable('from')">from<i class="sort-arrow"></i></th>
              <th class="sortable" data-col="subject" onclick="sortTable('subject')">subject<i class="sort-arrow"></i></th>
              <th class="sortable" data-col="date" onclick="sortTable('date')">date<i class="sort-arrow"></i></th>
              <th class="sortable" data-col="size" style="text-align:right;" onclick="sortTable('size')">size (KB/MB)<i class="sort-arrow"></i></th>
              <th></th>
            </tr>
          </thead>
          <tbody id="email-tbody"></tbody>
        </table>
      </div>

      <!-- rate limit banner -->
      <div class="rate-banner hidden" id="rate-banner">
        <span class="dot pulse"></span>
        <span id="rate-msg">rate limited — backing off</span>
      </div>

      <!-- progress -->
      <div class="progress-area hidden" id="progress-area">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
        <div class="progress-stats">
          <span id="progress-left"></span>
          <span id="progress-right"></span>
        </div>
      </div>

      <div class="btn-row" style="margin-top:14px;">
        <button class="btn-danger" id="delete-btn" onclick="startDelete()" disabled>delete all →</button>
        <button class="btn-ghost" id="archive-btn" onclick="startArchive()" disabled>archive to mbox →</button>
        <button class="btn-ghost" id="stop-btn" onclick="stopDelete()" disabled>stop</button>
        <button class="btn-ghost" onclick="resetPreview()">← back</button>
      </div>
      <div class="notice hidden" id="archive-notice"></div>
    </div>
  </div>
</div>

<script>
const API = "";
let readFilter  = "all";
let filterMode  = "older";
let scannedEmails = [];
let totalSize = 0;
let scanTotal = 0;   // total found by server search
let deleteSSE = null;
let stopRequested = false;

// ── helpers ──────────────────────────────────────────────────────────────────
const $ = (id) => document.getElementById(id);
const creds = () => ({
  host: $("host").value.trim(),
  port: $("port").value.trim(),
  tls:  $("tls").checked,
  user: $("user").value.trim(),
  password: $("password").value,
});
const qs = (obj) => new URLSearchParams(obj).toString();

function setStatus(id, type, text) {
  const el = $(id);
  el.className = `status-pill pill-${type}`;
  el.innerHTML = `<span class="dot"></span>${text}`;
}

function setFilterMode(btn) {
  document.querySelectorAll("[data-mode]").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  filterMode = btn.dataset.mode;
  $("mode-older").classList.toggle("hidden",   filterMode !== "older");
  $("mode-between").classList.toggle("hidden", filterMode !== "between");
}

// Set sensible default dates for the between-dates picker
(function() {
  const today = new Date();
  const month = new Date(today);
  month.setMonth(today.getMonth() - 1);
  const fmt = d => d.toISOString().slice(0, 10);
  document.addEventListener("DOMContentLoaded", () => {
    const df = $("date-from");
    const dt = $("date-to");
    if (df) df.value = fmt(month);
    if (dt) dt.value = fmt(today);
  });
})();

function setReadFilter(btn) {
  document.querySelectorAll(".seg-group button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  readFilter = btn.dataset.val;
}

// ── test connection ───────────────────────────────────────────────────────────
async function testConnect() {
  const btn = $("connect-btn");
  btn.disabled = true; btn.textContent = "connecting…";
  setStatus("conn-status", "info", "connecting");

  try {
    const r = await fetch(`${API}/api/connect`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(creds()),
    });
    const data = await r.json();
    if (data.ok) {
      setStatus("conn-status", "ok", "connected");
      $("filter-panel").classList.remove("hidden");
      $("folders-btn").disabled = false;
      btn.textContent = "reconnect";
    } else {
      setStatus("conn-status", "error", "failed");
      alert("Connection failed: " + data.error);
    }
  } catch (e) {
    setStatus("conn-status", "error", "server error");
    alert("Cannot reach local server.\nMake sure server.js is running:\n  node server.js");
  }
  btn.disabled = false;
}

// ── load folders ──────────────────────────────────────────────────────────────
async function loadFolders() {
  const btn = $("folders-btn");
  btn.disabled = true; btn.textContent = "loading…";
  try {
    const r = await fetch(`${API}/api/folders`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(creds()),
    });
    const data = await r.json();
    if (data.ok) {
      const sel = $("folder-select");
      sel.innerHTML = "";
      data.folders.forEach(f => {
        const o = document.createElement("option");
        o.value = f; o.textContent = f;
        if (f === "INBOX") o.selected = true;
        sel.appendChild(o);
      });
    }
  } catch (e) {}
  btn.disabled = false; btn.textContent = "load folders";
}

// ── scan ─────────────────────────────────────────────────────────────────────
function startScan() {
  scannedEmails = [];
  totalSize = 0;
  scanTotal = 0;
  const tbody = $("email-tbody");
  tbody.innerHTML = "";
  $("preview-panel").classList.remove("hidden");
  $("delete-btn").disabled = true;
  $("progress-area").classList.add("hidden");
  $("rate-banner").classList.add("hidden");
  $("scan-progress").classList.remove("hidden");
  $("scan-status-txt").textContent = "connecting…";
  $("stat-count").textContent = "—";
  $("stat-size").textContent = "";
  $("scan-btn").disabled = true;
  $("scan-btn").textContent = "scanning…";

  const baseParams = {
    ...creds(),
    folder:     $("folder-select").value,
    readStatus: readFilter,
    filterMode,
  };
  if (filterMode === "between") {
    const from = $("date-from").value;
    const to   = $("date-to").value;
    if (!from || !to) {
      alert("Please set both a from and to date.");
      $("scan-btn").disabled = false;
      $("scan-btn").textContent = "scan →";
      $("scan-progress").classList.add("hidden");
      return;
    }
    if (from > to) {
      alert("From date must be before to date.");
      $("scan-btn").disabled = false;
      $("scan-btn").textContent = "scan →";
      $("scan-progress").classList.add("hidden");
      return;
    }
    baseParams.dateFrom = from;
    baseParams.dateTo   = to;
  } else {
    baseParams.ageVal  = $("age-val").value;
    baseParams.ageUnit = $("age-unit").value;
  }
  const params = qs(baseParams);

  const es = new EventSource(`${API}/api/scan?${params}`);
  let first = true;

  es.onmessage = (evt) => {
    const msg = JSON.parse(evt.data);

    if (msg.type === "status") {
      $("scan-status-txt").textContent = msg.message;
    }

    if (msg.type === "total") {
      scanTotal = msg.count;
      $("stat-count").textContent = `0 / ${msg.count.toLocaleString()}`;
      $("scan-status-txt").textContent = `found ${msg.count.toLocaleString()} — fetching headers…`;
      if (first) { tbody.innerHTML = ""; first = false; }
    }

    if (msg.type === "email") {
      if (first) { tbody.innerHTML = ""; first = false; }
      scannedEmails.push(msg);
      totalSize += msg.size || 0;
      const countTxt = scanTotal > 0
        ? `${scannedEmails.length.toLocaleString()} / ${scanTotal.toLocaleString()}`
        : scannedEmails.length.toLocaleString();
      $("stat-count").textContent = countTxt;
      $("stat-size").textContent = fmtSize(totalSize);
      $("scan-status-txt").textContent = `fetched ${scannedEmails.length.toLocaleString()}${scanTotal ? ` of ${scanTotal.toLocaleString()}` : ""}…`;
      const tr = document.createElement("tr");
      tr.id = `row-${msg.uid}`;
      tr.innerHTML = `
        <td><span class="read-badge ${msg.read ? 'read' : 'unread'}"></span></td>
        <td title="${esc(msg.from)}">${esc(msg.from)}</td>
        <td title="${esc(msg.subject)}">${esc(msg.subject)}</td>
        <td class="col-date">${formatDate(msg.date)}</td>
        <td class="col-size">${fmtSize(msg.size || 0)}</td>
        <td><span class="row-tag tag-pending" id="rtag-${msg.uid}">—</span></td>
      `;
      tbody.appendChild(tr);
    }

    if (msg.type === "done") {
      es.close();
      $("scan-progress").classList.add("hidden");
      $("scan-btn").disabled = false;
      $("scan-btn").textContent = "scan →";
      if (scannedEmails.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="color:var(--muted);text-align:center;padding:14px;">no matching emails found</td></tr>`;
        $("stat-count").textContent = "0";
        $("stat-size").textContent = "";
      } else {
        const finalTxt = scanTotal > 0 && scanTotal !== scannedEmails.length
          ? `${scannedEmails.length.toLocaleString()} / ${scanTotal.toLocaleString()}`
          : scannedEmails.length.toLocaleString();
        $("stat-count").textContent = finalTxt;
        $("stat-size").textContent = fmtSize(totalSize);
        $("delete-btn").disabled = false;
        $("archive-btn").disabled = false;
      }
    }

    if (msg.type === "error") {
      es.close();
      $("scan-progress").classList.add("hidden");
      $("scan-btn").disabled = false;
      $("scan-btn").textContent = "scan →";
      tbody.innerHTML = `<tr><td colspan="6" style="color:var(--danger);padding:14px;">${esc(msg.message)}</td></tr>`;
    }
  };

  es.onerror = () => {
    es.close();
    $("scan-progress").classList.add("hidden");
    $("scan-btn").disabled = false;
    $("scan-btn").textContent = "scan →";
    if (first) tbody.innerHTML = `<tr><td colspan="6" style="color:var(--danger);text-align:center;padding:14px;">connection error — check server logs</td></tr>`;
  };
}

// ── delete ────────────────────────────────────────────────────────────────────
function startDelete() {
  stopRequested = false;
  $("delete-btn").disabled = true;
  $("stop-btn").disabled = false;
  $("progress-area").classList.remove("hidden");
  $("progress-fill").style.width = "0%";
  $("progress-fill").className = "progress-bar-fill";

  const uids = scannedEmails.map(e => e.uid).filter(Boolean);
  console.log("[delete] sending", uids.length, "UIDs:", uids.slice(0, 5), "...");

  if (uids.length === 0) {
    alert("No valid UIDs to delete — try scanning again.");
    $("delete-btn").disabled = false;
    $("stop-btn").disabled = true;
    return;
  }

  // Use POST + fetch-based SSE to avoid URL length limits with large UID lists
  const body = JSON.stringify({ ...creds(), tls: $("tls").checked, folder: $("folder-select").value, uids });

  fetch(`${API}/api/delete`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body,
  }).then(response => {
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";

    const pump = () => reader.read().then(({ done, value }) => {
      if (done) { $("stop-btn").disabled = true; return; }
      buf += decoder.decode(value, { stream: true });
      const parts = buf.split("\n\n");
      buf = parts.pop();
      for (const part of parts) {
        const line = part.replace(/^data: /, "").trim();
        if (!line) continue;
        try { handleDeleteEvent(JSON.parse(line)); } catch(e) {}
      }
      pump();
    }).catch(() => { $("stop-btn").disabled = true; });

    pump();
  }).catch(err => {
    console.error("[delete] fetch error:", err);
    $("delete-btn").disabled = false;
    $("stop-btn").disabled = true;
  });

  // handler is now in handleDeleteEvent()
}

function handleDeleteEvent(msg) {
  // progress — throttled counter update (every 50 deletes server-side)
  if (msg.type === "progress") {
    $("rate-banner").classList.add("hidden");
    updateProgress(msg.deleted, msg.total,
      `${msg.deleted.toLocaleString()} / ${msg.total.toLocaleString()} deleted`,
      `${Math.round(msg.deleted / msg.total * 100)}%`
    );
  }

  // deleted — individual row update, but only touch the DOM if the row is visible
  if (msg.type === "deleted") {
    $("rate-banner").classList.add("hidden");
    const row = $(`row-${msg.uid}`);
    const tag = $(`rtag-${msg.uid}`);
    if (row) row.classList.add("deleted");
    if (tag) { tag.className = "row-tag tag-done"; tag.textContent = "deleted"; }
  }

  if (msg.type === "status") {
    $("progress-left").textContent = msg.message;
  }

  if (msg.type === "ratelimit") {
    const secs = (msg.retryIn / 1000).toFixed(1);
    $("rate-banner").classList.remove("hidden");
    $("rate-msg").textContent = `rate limited — backing off ${secs}s (hit #${msg.hits})`;
  }

  if (msg.type === "skipped") {
    const row = $(`row-${msg.uid}`);
    const tag = $(`rtag-${msg.uid}`);
    if (row) row.classList.add("skipped");
    if (tag) { tag.className = "row-tag tag-skipped"; tag.textContent = "skip"; }
  }

  if (msg.type === "error") {
    if (msg.uid) {
      const tag = $(`rtag-${msg.uid}`);
      if (tag) { tag.className = "row-tag tag-skipped"; tag.textContent = "err"; }
    } else {
      console.error("[delete] error:", msg.message);
    }
  }

  if (msg.type === "done") {
    $("stop-btn").disabled = true;
    $("rate-banner").classList.add("hidden");
    $("progress-fill").className = "progress-bar-fill danger";
    updateProgress(msg.deleted, msg.total,
      `done — ${msg.deleted.toLocaleString()} deleted`,
      msg.rateLimitHits ? `${msg.rateLimitHits} rate-limit hit(s)` : "completed"
    );
  }
}

function stopDelete() {
  if (deleteSSE) { deleteSSE.close(); deleteSSE = null; }
  $("stop-btn").disabled = true;
  $("rate-banner").classList.add("hidden");
  $("progress-right").textContent = "stopped by user";
}

// ── table sorting ────────────────────────────────────────────────────────────
let sortCol = null;
let sortDir = "asc";

function sortTable(col) {
  if (sortCol === col) {
    sortDir = sortDir === "asc" ? "desc" : "asc";
  } else {
    sortCol = col;
    sortDir = col === "date" || col === "size" ? "desc" : "asc"; // sensible defaults
  }

  // Update header indicators
  document.querySelectorAll("th.sortable").forEach(th => {
    th.classList.remove("asc", "desc");
    if (th.dataset.col === col) th.classList.add(sortDir);
  });

  // Sort scannedEmails
  scannedEmails.sort((a, b) => {
    let av, bv;
    if (col === "from")    { av = (a.from    || "").toLowerCase(); bv = (b.from    || "").toLowerCase(); }
    if (col === "subject") { av = (a.subject || "").toLowerCase(); bv = (b.subject || "").toLowerCase(); }
    if (col === "size")    { av = a.size || 0;                     bv = b.size || 0; }
    if (col === "date")    {
      av = a.date ? new Date(a.date).getTime() : 0;
      bv = b.date ? new Date(b.date).getTime() : 0;
    }
    if (av < bv) return sortDir === "asc" ? -1 :  1;
    if (av > bv) return sortDir === "asc" ?  1 : -1;
    return 0;
  });

  // Re-render tbody preserving row state (deleted/skipped classes and tags)
  const tbody = $("email-tbody");
  const rowStates = {};
  tbody.querySelectorAll("tr[id]").forEach(tr => {
    const tag = tr.querySelector(".row-tag");
    rowStates[tr.id] = {
      classes: [...tr.classList].filter(c => c !== ""),
      tagClass: tag ? tag.className : "",
      tagText:  tag ? tag.textContent : "",
    };
  });

  tbody.innerHTML = "";
  for (const msg of scannedEmails) {
    const tr = document.createElement("tr");
    tr.id = `row-${msg.uid}`;
    const state = rowStates[tr.id];
    if (state) state.classes.forEach(c => tr.classList.add(c));
    tr.innerHTML = `
      <td><span class="read-badge ${msg.read ? "read" : "unread"}"></span></td>
      <td title="${esc(msg.from)}">${esc(msg.from)}</td>
      <td title="${esc(msg.subject)}">${esc(msg.subject)}</td>
      <td class="col-date">${formatDate(msg.date)}</td>
      <td class="col-size">${fmtSize(msg.size || 0)}</td>
      <td><span class="row-tag ${state ? state.tagClass : "tag-pending"}" id="rtag-${msg.uid}">${state ? state.tagText : "—"}</span></td>
    `;
    tbody.appendChild(tr);
  }
}

function updateProgress(done, total, left, right) {
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  $("progress-fill").style.width = pct + "%";
  $("progress-left").textContent = left;
  $("progress-right").textContent = right;
}

async function startArchive() {
  const uids = scannedEmails.map(e => e.uid).filter(Boolean);
  if (uids.length === 0) { alert("No messages to archive — scan first."); return; }

  $("archive-btn").disabled = true;
  $("delete-btn").disabled  = true;
  $("stop-btn").disabled    = true;
  $("progress-area").classList.remove("hidden");
  $("progress-fill").style.width  = "0%";
  $("progress-fill").className    = "progress-bar-fill";
  $("progress-left").textContent  = `starting archive of ${uids.length.toLocaleString()} messages…`;
  $("progress-right").textContent = "0 MB";

  const requestBody = JSON.stringify({
    ...creds(),
    tls:    $("tls").checked,
    folder: $("folder-select").value,
    uids,
  });

  let jobId = null;

  try {
    const response = await fetch(`${API}/api/archive/start`, {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    requestBody,
    });

    if (!response.ok) throw new Error(`Server error: ${response.status}`);

    const reader  = response.body.getReader();
    const decoder = new TextDecoder();
    let   buf     = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const parts = buf.split("\n\n");
      buf = parts.pop();
      for (const part of parts) {
        const line = part.replace(/^data: /, "").trim();
        if (!line) continue;
        let msg;
        try { msg = JSON.parse(line); } catch { continue; }

        if (msg.type === "started")  { jobId = msg.jobId; }
        if (msg.type === "progress") {
          const pct = Math.round(msg.written / msg.total * 100);
          $("progress-fill").style.width  = pct + "%";
          $("progress-left").textContent  = `archiving ${msg.written.toLocaleString()} / ${msg.total.toLocaleString()} messages…`;
          $("progress-right").textContent = `${msg.sizeMB.toFixed(1)} MB`;
        }
        if (msg.type === "reconnect") {
          const secs = Math.round(msg.retryIn / 1000);
          $("progress-left").textContent = `connection dropped — reconnecting in ${secs}s (${msg.remaining.toLocaleString()} remaining)…`;
        }
        if (msg.type === "warning") { console.warn("[archive]", msg.message); }
        if (msg.type === "done") {
          $("progress-fill").style.width  = "100%";
          $("progress-right").textContent = `${msg.sizeMB.toFixed(1)} MB`;
          $("progress-left").textContent  = msg.error
            ? `done with errors — ${msg.written.toLocaleString()}/${msg.total.toLocaleString()} messages`
            : `archive ready — ${msg.written.toLocaleString()} messages, ${msg.sizeMB.toFixed(1)} MB`;
          jobId = msg.jobId;
        }
      }
    }

    if (jobId) {
      const defaultName = `archive-${new Date().toISOString().slice(0,10)}.mbox`;
      const dlUrl = `${API}/api/archive/download/${jobId}`;
      $("progress-left").textContent += " — choose where to save…";

      if (window.showSaveFilePicker) {
        try {
          const fileHandle = await window.showSaveFilePicker({
            suggestedName: defaultName,
            types: [{ description: "Mbox mail archive", accept: { "application/mbox": [".mbox"] } }],
          });
          const dl       = await fetch(dlUrl);
          const writable = await fileHandle.createWritable();
          const rdr      = dl.body.getReader();
          let   dlBytes  = 0;
          while (true) {
            const { done, value } = await rdr.read();
            if (done) break;
            await writable.write(value);
            dlBytes += value.length;
            $("progress-right").textContent = `${(dlBytes/1024/1024).toFixed(1)} MB saved`;
          }
          await writable.close();
          $("progress-left").textContent = `saved to ${fileHandle.name}`;
        } catch (e) {
          if (e.name !== "AbortError") triggerDownload(dlUrl, defaultName);
        }
      } else {
        triggerDownload(dlUrl, defaultName);
        $("progress-left").textContent += " — download started";
      }
    }

  } catch (err) {
    console.error("[archive] error:", err);
    $("progress-left").textContent = `archive failed: ${err.message}`;
    $("progress-fill").className   = "progress-bar-fill danger";
  }

  $("archive-btn").disabled = false;
  $("delete-btn").disabled  = false;
}

function triggerDownload(url, filename) {
  const a = Object.assign(document.createElement("a"), { href: url, download: filename });
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function resetPreview() {
  if (deleteSSE) { deleteSSE.close(); deleteSSE = null; }
  $("preview-panel").classList.add("hidden");
  scannedEmails = [];
  totalSize = 0;
  scanTotal = 0;
}

// ── utils ─────────────────────────────────────────────────────────────────────
function fmtSize(bytes) {
  if (!bytes || bytes === 0) return "—";
  if (bytes < 1024)                  return bytes + " B";
  if (bytes < 1024 * 1024)           return (bytes / 1024).toFixed(1) + " KB";
  if (bytes < 1024 * 1024 * 1024)   return (bytes / (1024 * 1024)).toFixed(1) + " MB";
  return (bytes / (1024 * 1024 * 1024)).toFixed(2) + " GB";
}

function esc(s) {
  return String(s || "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function formatDate(raw) {
  if (!raw) return "";
  try {
    const d = new Date(raw);
    if (isNaN(d)) return raw.slice(0, 16);
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
  } catch { return raw.slice(0, 16); }
}
